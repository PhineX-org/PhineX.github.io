<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PhineX Community — Exclusive Access</title>
  <link rel="icon" type="image/x-icon" href="PhineX (2).png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --neon:#39ff14;
      --neon-glow:rgba(57,255,20,0.15);
      --void:#000000;
      --surface:#0a0a0a;
      --card:#121212;
      --border:#2a2a2a;
      --text:#ffffff;
      --text-muted:#8e8e8e;
      --hover:#1a1a1a;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--void);
      color: var(--text);
      overflow-x: hidden;
    }

    /* ═══════════════════════════════════════════════════════
       AUTH SCREEN (Login)
    ═══════════════════════════════════════════════════════ */
    #authScreen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #000000 0%, #0a0a0a 100%);
      padding: 20px;
    }

    .auth-container {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 0 50px rgba(57, 255, 20, 0.1);
    }

    .auth-logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      background: linear-gradient(135deg, var(--neon), #00ff88);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      color: #000;
      box-shadow: 0 0 40px var(--neon-glow);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 40px var(--neon-glow); }
      50% { box-shadow: 0 0 60px rgba(57, 255, 20, 0.3); }
    }

    .auth-title {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 8px;
      color: var(--text);
    }

    .auth-subtitle {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 32px;
    }

    .input-wrapper {
      position: relative;
      margin-bottom: 20px;
    }

    .input-wrapper input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      font-size: 14px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      transition: all 0.3s;
    }

    .input-wrapper input:focus {
      outline: none;
      border-color: var(--neon);
      box-shadow: 0 0 0 3px var(--neon-glow);
    }

    .btn-primary {
      width: 100%;
      background: var(--neon);
      color: #000;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 15px;
      padding: 16px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 20px var(--neon-glow);
    }

    .btn-primary:hover {
      background: #50ff28;
      transform: translateY(-2px);
      box-shadow: 0 6px 30px rgba(57, 255, 20, 0.3);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .msg {
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
      margin-top: 16px;
      display: none;
    }

    .msg.error {
      background: rgba(255, 68, 68, 0.1);
      border: 1px solid rgba(255, 68, 68, 0.3);
      color: #ff4444;
    }

    .msg.success {
      background: rgba(57, 255, 20, 0.1);
      border: 1px solid var(--neon);
      color: var(--neon);
    }

    /* ═══════════════════════════════════════════════════════
       MAIN APP LAYOUT
    ═══════════════════════════════════════════════════════ */
    #app {
      display: none;
      min-height: 100vh;
    }

    /* Top Navigation Bar */
    .top-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-family: 'Syne', sans-serif;
      font-size: 24px;
      font-weight: 800;
      color: var(--text);
    }

    .nav-logo i {
      color: var(--neon);
      font-size: 28px;
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .nav-badge {
      background: linear-gradient(135deg, var(--neon), #00ff88);
      color: #000;
      font-size: 12px;
      font-weight: 700;
      padding: 6px 12px;
      border-radius: 20px;
    }

    .btn-logout {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-logout:hover {
      border-color: #ff4444;
      color: #ff4444;
    }

    /* Bottom Navigation (Mobile) */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: none;
      z-index: 1000;
    }

    .bottom-nav-inner {
      display: flex;
      height: 100%;
    }

    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      cursor: pointer;
      color: var(--text-muted);
      transition: all 0.2s;
      border: none;
      background: transparent;
      font-family: 'DM Sans', sans-serif;
    }

    .nav-item i {
      font-size: 22px;
    }

    .nav-item span {
      font-size: 11px;
      font-weight: 500;
    }

    .nav-item.active {
      color: var(--neon);
    }

    /* Main Content Container */
    .main-container {
      padding-top: 60px;
      min-height: 100vh;
    }

    /* ═══════════════════════════════════════════════════════
       INSTAGRAM-STYLE FEED
    ═══════════════════════════════════════════════════════ */
    .feed-container {
      max-width: 630px;
      margin: 0 auto;
      padding: 20px 0;
    }

    /* Post Card */
    .post {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 20px;
      overflow: hidden;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Post Header */
    .post-header {
      display: flex;
      align-items: center;
      padding: 14px 16px;
      gap: 12px;
    }

    .post-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--neon), #00ff88);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      color: #000;
      flex-shrink: 0;
    }

    .post-info {
      flex: 1;
    }

    .post-author {
      font-weight: 600;
      font-size: 14px;
      color: var(--text);
      margin-bottom: 2px;
    }

    .post-time {
      font-size: 12px;
      color: var(--text-muted);
    }

    .post-options {
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 18px;
      cursor: pointer;
      padding: 8px;
      transition: all 0.2s;
    }

    .post-options:hover {
      color: var(--text);
    }

    /* Post Image */
    .post-image-wrapper {
      position: relative;
      width: 100%;
      background: var(--surface);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }

    .post-image {
      width: 100%;
      display: block;
      max-height: 600px;
      object-fit: cover;
    }

    /* Post Content */
    .post-content {
      padding: 16px;
    }

    .post-title {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
    }

    .post-text {
      font-size: 14px;
      line-height: 1.6;
      color: var(--text);
      margin-bottom: 12px;
    }

    /* Post Actions */
    .post-actions {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 16px 16px;
    }

    .action-btn {
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
      padding: 0;
    }

    .action-btn:hover {
      transform: scale(1.1);
    }

    .action-btn.liked {
      color: #ff0050;
      animation: likeAnim 0.3s ease;
    }

    @keyframes likeAnim {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.3); }
    }

    .action-btn span {
      font-size: 14px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
    }

    .action-btn.share {
      margin-left: auto;
    }

    /* Like Count */
    .likes-count {
      padding: 0 16px 8px;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
    }

    .empty-state i {
      font-size: 64px;
      color: var(--border);
      margin-bottom: 16px;
    }

    .empty-state h3 {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      color: var(--text);
      margin-bottom: 8px;
    }

    .empty-state p {
      font-size: 14px;
    }

    /* Loading Skeleton */
    .skeleton-post {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 20px;
      padding: 16px;
    }

    .skeleton {
      background: linear-gradient(90deg, var(--surface) 25%, var(--hover) 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: loading 1.5s infinite;
      border-radius: 8px;
    }

    @keyframes loading {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .skeleton-header {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }

    .skeleton-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
    }

    .skeleton-text {
      flex: 1;
    }

    .skeleton-line {
      height: 12px;
      margin-bottom: 8px;
    }

    .skeleton-image {
      width: 100%;
      height: 400px;
      margin-bottom: 16px;
    }

    /* ═══════════════════════════════════════════════════════
       CHAT / MESSAGES
    ═══════════════════════════════════════════════════════ */
    .chat-container {
      max-width: 935px;
      margin: 0 auto;
      display: flex;
      height: calc(100vh - 60px);
      background: var(--card);
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }

    .chat-list {
      width: 350px;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }

    .chat-list-header {
      padding: 20px;
      border-bottom: 1px solid var(--border);
    }

    .chat-list-header h2 {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 800;
      color: var(--text);
    }

    .chat-channels {
      flex: 1;
      overflow-y: auto;
    }

    .chat-channel {
      padding: 16px 20px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .chat-channel:hover {
      background: var(--hover);
    }

    .chat-channel.active {
      background: var(--hover);
      border-left: 3px solid var(--neon);
    }

    .chat-channel-icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--neon), #00ff88);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: #000;
    }

    .chat-channel-info {
      flex: 1;
    }

    .chat-channel-name {
      font-weight: 600;
      font-size: 14px;
      color: var(--text);
      margin-bottom: 4px;
    }

    .chat-channel-desc {
      font-size: 12px;
      color: var(--text-muted);
    }

    .chat-main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .chat-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .chat-header h3 {
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      display: flex;
      gap: 12px;
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--neon), #00ff88);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 12px;
      color: #000;
      flex-shrink: 0;
    }

    .message-content {
      flex: 1;
    }

    .message-header {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 4px;
    }

    .message-author {
      font-weight: 600;
      font-size: 14px;
      color: var(--text);
    }

    .message-time {
      font-size: 11px;
      color: var(--text-muted);
    }

    .message-text {
      font-size: 14px;
      color: var(--text);
      line-height: 1.5;
      word-wrap: break-word;
    }

    .chat-input-wrapper {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }

    .chat-input-container {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .chat-input {
      flex: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 12px 20px;
      color: var(--text);
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.2s;
    }

    .chat-input:focus {
      outline: none;
      border-color: var(--neon);
    }

    .chat-input:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-send {
      background: var(--neon);
      color: #000;
      border: none;
      padding: 12px 24px;
      border-radius: 24px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Syne', sans-serif;
    }

    .btn-send:hover {
      background: #50ff28;
      transform: scale(1.05);
    }

    .btn-send:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ═══════════════════════════════════════════════════════
       CREATE POST MODAL
    ═══════════════════════════════════════════════════════ */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(8px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      padding: 20px;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      max-width: 600px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      animation: modalIn 0.3s ease;
    }

    @keyframes modalIn {
      from {
        opacity: 0;
        transform: scale(0.9);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .modal-header {
      padding: 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal-title {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 800;
      color: var(--text);
    }

    .btn-close {
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 28px;
      cursor: pointer;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: all 0.2s;
    }

    .btn-close:hover {
      background: var(--hover);
      color: var(--text);
    }

    .modal-body {
      padding: 24px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-weight: 600;
      font-size: 14px;
      color: var(--text);
      margin-bottom: 8px;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      color: var(--text);
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.2s;
    }

    .form-group textarea {
      min-height: 120px;
      resize: vertical;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--neon);
      box-shadow: 0 0 0 3px var(--neon-glow);
    }

    .image-upload-area {
      border: 2px dashed var(--border);
      border-radius: 8px;
      padding: 40px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .image-upload-area:hover {
      border-color: var(--neon);
      background: var(--hover);
    }

    .image-upload-area i {
      font-size: 48px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .image-upload-area p {
      color: var(--text-muted);
      font-size: 14px;
    }

    .image-preview {
      margin-top: 16px;
      border-radius: 8px;
      overflow: hidden;
      display: none;
    }

    .image-preview img {
      width: 100%;
      max-height: 400px;
      object-fit: contain;
      background: var(--surface);
    }

    .btn-submit {
      width: 100%;
      background: var(--neon);
      color: #000;
      border: none;
      padding: 14px;
      border-radius: 8px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-submit:hover {
      background: #50ff28;
      transform: translateY(-2px);
    }

    /* Comment Modal */
    .comments-section {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    .comments-header {
      font-weight: 700;
      font-size: 16px;
      color: var(--text);
      margin-bottom: 16px;
    }

    .comment-form {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }

    .comment-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 16px;
      color: var(--text);
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
    }

    .comment-input:focus {
      outline: none;
      border-color: var(--neon);
    }

    .btn-comment {
      background: var(--neon);
      color: #000;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Syne', sans-serif;
    }

    .comments-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .comment {
      display: flex;
      gap: 12px;
    }

    .comment-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--neon), #00ff88);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 12px;
      color: #000;
      flex-shrink: 0;
    }

    .comment-content {
      flex: 1;
    }

    .comment-author {
      font-weight: 600;
      font-size: 13px;
      color: var(--text);
      margin-bottom: 4px;
    }

    .comment-text {
      font-size: 14px;
      color: var(--text);
      line-height: 1.5;
    }

    /* Floating Action Button (Create Post) */
    .fab {
      position: fixed;
      bottom: 80px;
      right: 24px;
      width: 56px;
      height: 56px;
      background: var(--neon);
      border: none;
      border-radius: 50%;
      color: #000;
      font-size: 24px;
      cursor: pointer;
      box-shadow: 0 4px 20px var(--neon-glow);
      transition: all 0.3s;
      z-index: 999;
      display: none;
    }

    .fab:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 30px rgba(57, 255, 20, 0.4);
    }

    .fab.show {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* View Selector */
    .view {
      display: none;
    }

    .view.active {
      display: block;
    }

    /* Hide elements */
    .hidden {
      display: none !important;
    }

    /* ═══════════════════════════════════════════════════════
       RESPONSIVE
    ═══════════════════════════════════════════════════════ */
    @media (max-width: 768px) {
      .bottom-nav {
        display: block;
      }

      .main-container {
        padding-bottom: 60px;
      }

      .feed-container {
        padding: 16px 0;
      }

      .post {
        border-radius: 0;
        border-left: none;
        border-right: none;
      }

      .chat-list {
        width: 100%;
        display: none;
      }

      .chat-list.mobile-show {
        display: flex;
      }

      .chat-container {
        border: none;
      }

      .fab {
        bottom: 80px;
      }

      .nav-actions .btn-logout {
        padding: 6px 12px;
        font-size: 12px;
      }

      .nav-badge {
        font-size: 11px;
        padding: 4px 10px;
      }
    }

    /* Scrollbar Styling */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--surface);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }
  </style>

<body>
  <!-- Auth Screen -->
  <div id="authScreen">
    <div class="auth-container">
      <div class="auth-logo">
        <i class="fas fa-dragon"></i>
      </div>
      <h1 class="auth-title">PhineX Community</h1>
      <p class="auth-subtitle">Enter your access code to continue</p>
      
      <div class="input-wrapper">
        <input type="text" id="accessCodeInput" placeholder="Access Code" maxlength="100" autocomplete="off">
      </div>
      
      <button class="btn-primary" id="verifyBtn">
        <span>Verify & Access</span>
      </button>
      
      <div class="msg" id="errorMsg"></div>
      <div class="msg success" id="successMsg"></div>
    </div>
  </div>

  <!-- Main App -->
  <div id="app">
    <!-- Top Navigation -->
    <div class="top-nav">
      <div class="nav-logo">
        <i class="fas fa-dragon"></i>
        <span>PhineX</span>
      </div>
      <div class="nav-actions">
        <div class="nav-badge" id="userRole">Member</div>
        <button class="btn-logout" id="logoutBtn">
          <i class="fas fa-sign-out-alt"></i>
        </button>
      </div>
    </div>

    <!-- Bottom Navigation (Mobile) -->
    <div class="bottom-nav">
      <div class="bottom-nav-inner">
        <button class="nav-item active" data-view="feed">
          <i class="fas fa-home"></i>
          <span>Home</span>
        </button>
        <button class="nav-item" data-view="messages">
          <i class="fas fa-comment-dots"></i>
          <span>Messages</span>
        </button>
        <button class="nav-item hidden" id="navCreateBtn">
          <i class="fas fa-plus-square"></i>
          <span>Create</span>
        </button>
      </div>
    </div>

    <!-- Main Container -->
    <div class="main-container">
      <!-- Feed View -->
      <div class="view active" id="feedView">
        <div class="feed-container">
          <!-- Loading Skeletons -->
          <div id="loadingSkeletons">
            <div class="skeleton-post">
              <div class="skeleton-header">
                <div class="skeleton skeleton-avatar"></div>
                <div class="skeleton-text">
                  <div class="skeleton skeleton-line" style="width: 30%; margin-bottom: 4px;"></div>
                  <div class="skeleton skeleton-line" style="width: 20%; height: 10px;"></div>
                </div>
              </div>
              <div class="skeleton skeleton-image"></div>
              <div class="skeleton skeleton-line" style="width: 70%;"></div>
            </div>
          </div>

          <!-- Posts Container -->
          <div id="postsContainer"></div>

          <!-- Empty State -->
          <div class="empty-state hidden" id="emptyState">
            <i class="fas fa-images"></i>
            <h3>No posts yet</h3>
            <p>Be the first to share something amazing!</p>
          </div>
        </div>
      </div>

      <!-- Messages View -->
      <div class="view" id="messagesView">
        <div class="chat-container">
          <div class="chat-list">
            <div class="chat-list-header">
              <h2>Messages</h2>
            </div>
            <div class="chat-channels">
              <div class="chat-channel active" data-channel="admin">
                <div class="chat-channel-icon">
                  <i class="fas fa-shield-alt"></i>
                </div>
                <div class="chat-channel-info">
                  <div class="chat-channel-name">Admin Chat</div>
                  <div class="chat-channel-desc">Admins only</div>
                </div>
              </div>
              <div class="chat-channel" data-channel="public">
                <div class="chat-channel-icon">
                  <i class="fas fa-users"></i>
                </div>
                <div class="chat-channel-info">
                  <div class="chat-channel-name">Public Chat</div>
                  <div class="chat-channel-desc">Community discussion</div>
                </div>
              </div>
            </div>
          </div>

          <div class="chat-main">
            <div class="chat-header">
              <div class="chat-channel-icon" style="width: 32px; height: 32px; font-size: 16px;">
                <i class="fas fa-shield-alt" id="currentChannelIcon"></i>
              </div>
              <h3 id="currentChannelName">Admin Chat</h3>
            </div>

            <div class="chat-messages" id="chatMessages">
              <!-- Messages will load here -->
            </div>

            <div class="chat-input-wrapper">
              <div class="chat-input-container">
                <input type="text" class="chat-input" id="messageInput" placeholder="Type a message..." disabled>
                <button class="btn-send" id="sendMessageBtn" disabled>Send</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Floating Action Button (Admin Only) -->
    <button class="fab" id="fabCreatePost">
      <i class="fas fa-plus"></i>
    </button>

    <!-- Create Post Modal -->
    <div class="modal" id="createPostModal">
      <div class="modal-content">
        <div class="modal-header">
          <h3 class="modal-title">Create Post</h3>
          <button class="btn-close" id="closeCreateModal">&times;</button>
        </div>
        <div class="modal-body">
          <form id="createPostForm">
            <div class="form-group">
              <label>Title</label>
              <input type="text" id="postTitle" placeholder="Give your post a title" required>
            </div>
            <div class="form-group">
              <label>What's on your mind?</label>
              <textarea id="postContent" placeholder="Share your thoughts..." required></textarea>
            </div>
            <div class="form-group">
              <label>Add Image (Optional)</label>
              <input type="file" id="postImage" accept="image/*" style="display: none;">
              <div class="image-upload-area" id="imageUploadArea">
                <i class="fas fa-image"></i>
                <p>Click to upload an image</p>
              </div>
              <div class="image-preview" id="imagePreview">
                <img id="previewImg" src="" alt="Preview">
              </div>
            </div>
            <button type="submit" class="btn-submit">
              <i class="fas fa-paper-plane"></i> Publish Post
            </button>
          </form>
        </div>
      </div>
    </div>

    <!-- Post Detail Modal -->
    <div class="modal" id="postDetailModal">
      <div class="modal-content">
        <div class="modal-header">
          <h3 class="modal-title">Post</h3>
          <button class="btn-close" id="closeDetailModal">&times;</button>
        </div>
        <div class="modal-body" id="postDetailContent">
          <!-- Post details and comments will load here -->
        </div>
      </div>
    </div>
  </div>

  <!-- Supabase Client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <script>
    (function() {
      // Configuration
      const CONFIG = {
        SUPABASE_URL: 'https://nwgsqaztrggyfthkkpan.supabase.co',
        SUPABASE_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im53Z3NxYXp0cmdneWZ0aGtrcGFuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzgxOTEyNTgsImV4cCI6MjA1Mzc2NzI1OH0.MCz2o6MGHP3yqCcr2pXuSWe4ZOUQhZoEOdN75SLz1gY',
        GUILD_ID: '1438576191610032160',
        ADMIN_CODE: 'ADMIN26'
      };

      const supabase = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);

      let currentUser = null;
      let isAdmin = false;
      let currentChannel = 'admin';
      let currentPost = null;

      // DOM Elements
      const authScreen = document.getElementById('authScreen');
      const app = document.getElementById('app');
      const accessCodeInput = document.getElementById('accessCodeInput');
      const verifyBtn = document.getElementById('verifyBtn');
      const errorMsg = document.getElementById('errorMsg');
      const successMsg = document.getElementById('successMsg');
      const logoutBtn = document.getElementById('logoutBtn');
      const userRole = document.getElementById('userRole');
      const fabCreatePost = document.getElementById('fabCreatePost');
      const createPostModal = document.getElementById('createPostModal');
      const postDetailModal = document.getElementById('postDetailModal');

      // Initialize
      init();

      function init() {
        setupEventListeners();
      }

      function setupEventListeners() {
        // Auth
        verifyBtn.addEventListener('click', handleVerifyCode);
        accessCodeInput.addEventListener('keypress', (e) => {
          if (e.key === 'Enter') handleVerifyCode();
        });
        logoutBtn.addEventListener('click', () => location.reload());

        // Navigation
        document.querySelectorAll('.nav-item').forEach(btn => {
          btn.addEventListener('click', () => {
            const view = btn.dataset.view;
            if (view) switchView(view);
          });
        });

        // Create Post
        fabCreatePost.addEventListener('click', openCreatePostModal);
        document.getElementById('navCreateBtn').addEventListener('click', openCreatePostModal);
        document.getElementById('closeCreateModal').addEventListener('click', closeCreatePostModal);
        document.getElementById('imageUploadArea').addEventListener('click', () => {
          document.getElementById('postImage').click();
        });
        document.getElementById('postImage').addEventListener('change', handleImageSelect);
        document.getElementById('createPostForm').addEventListener('submit', handleCreatePost);

        // Post Detail
        document.getElementById('closeDetailModal').addEventListener('click', closePostDetailModal);

        // Chat
        document.querySelectorAll('.chat-channel').forEach(channel => {
          channel.addEventListener('click', () => {
            const channelType = channel.dataset.channel;
            switchChannel(channelType);
          });
        });
        document.getElementById('sendMessageBtn').addEventListener('click', sendMessage);
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
          if (e.key === 'Enter') sendMessage();
        });

        // Close modals on overlay click
        [createPostModal, postDetailModal].forEach(modal => {
          modal.addEventListener('click', (e) => {
            if (e.target === modal) {
              modal.classList.remove('active');
            }
          });
        });
      }

      async function handleVerifyCode() {
        const rawCode = accessCodeInput.value.trim().toUpperCase();
        
        if (!rawCode) {
          showError('Please enter an access code');
          return;
        }

        const normalizedCode = rawCode.replace(/-/g, '');
        
        verifyBtn.disabled = true;
        verifyBtn.innerHTML = '<span>Verifying...</span>';

        try {
          // Check admin code
          if (normalizedCode === CONFIG.ADMIN_CODE) {
            isAdmin = true;
            currentUser = { code: rawCode, user_id: 'ADMIN', is_admin: true };
            showSuccess('Admin access granted!');
            setTimeout(showApp, 1000);
            return;
          }

          // Check database
          const { data, error } = await supabase
            .from('community_tickets')
            .select('*')
            .or(`code.eq.${rawCode},code.eq.${normalizedCode}`)
            .eq('guild_id', CONFIG.GUILD_ID)
            .maybeSingle();

          if (error || !data) {
            showError('Invalid access code');
            verifyBtn.disabled = false;
            verifyBtn.innerHTML = '<span>Verify & Access</span>';
            return;
          }

          // Mark as used
          if (!data.used) {
            await supabase
              .from('community_tickets')
              .update({ used: true, used_at: new Date().toISOString() })
              .eq('code', data.code);
          }

          currentUser = data;
          isAdmin = data.is_admin || false;
          showSuccess('Access granted!');
          setTimeout(showApp, 1000);

        } catch (err) {
          console.error('Verification error:', err);
          showError('An error occurred. Please try again.');
          verifyBtn.disabled = false;
          verifyBtn.innerHTML = '<span>Verify & Access</span>';
        }
      }

      function showError(message) {
        errorMsg.textContent = message;
        errorMsg.style.display = 'block';
        errorMsg.classList.add('error');
        successMsg.style.display = 'none';
      }

      function showSuccess(message) {
        successMsg.textContent = message;
        successMsg.style.display = 'block';
        errorMsg.style.display = 'none';
      }

      function showApp() {
        authScreen.style.display = 'none';
        app.style.display = 'block';

        // Setup admin features
        if (isAdmin) {
          userRole.textContent = 'Admin';
          fabCreatePost.classList.add('show');
          document.getElementById('navCreateBtn').classList.remove('hidden');
          document.getElementById('messageInput').disabled = false;
          document.getElementById('sendMessageBtn').disabled = false;
        } else {
          // Public chat is always enabled
          switchChannel('public');
        }

        loadPosts();
        loadMessages(currentChannel);
        subscribeToRealtime();
      }

      function switchView(viewName) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        
        document.getElementById(`${viewName}View`).classList.add('active');
        document.querySelector(`[data-view="${viewName}"]`).classList.add('active');

        if (viewName === 'messages') {
          loadMessages(currentChannel);
        }
      }

      function switchChannel(channelType) {
        currentChannel = channelType;

        document.querySelectorAll('.chat-channel').forEach(c => c.classList.remove('active'));
        document.querySelector(`[data-channel="${channelType}"]`).classList.add('active');

        const icons = { admin: 'fa-shield-alt', public: 'fa-users' };
        const names = { admin: 'Admin Chat', public: 'Public Chat' };

        document.getElementById('currentChannelIcon').className = `fas ${icons[channelType]}`;
        document.getElementById('currentChannelName').textContent = names[channelType];

        // Enable/disable input based on channel and role
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendMessageBtn');

        if (channelType === 'admin' && !isAdmin) {
          messageInput.disabled = true;
          sendBtn.disabled = true;
          messageInput.placeholder = 'Only admins can send messages here';
        } else {
          messageInput.disabled = false;
          sendBtn.disabled = false;
          messageInput.placeholder = 'Type a message...';
        }

        loadMessages(channelType);
      }

      async function loadPosts() {
        const container = document.getElementById('postsContainer');
        const skeleton = document.getElementById('loadingSkeletons');
        const emptyState = document.getElementById('emptyState');

        skeleton.style.display = 'block';
        container.innerHTML = '';
        emptyState.classList.add('hidden');

        try {
          const { data, error } = await supabase
            .from('community_posts')
            .select('*')
            .eq('guild_id', CONFIG.GUILD_ID)
            .order('created_at', { ascending: false });

          skeleton.style.display = 'none';

          if (error) throw error;

          if (!data || data.length === 0) {
            emptyState.classList.remove('hidden');
            return;
          }

          data.forEach(post => {
            container.appendChild(createPostElement(post));
          });

        } catch (err) {
          console.error('Error loading posts:', err);
          skeleton.style.display = 'none';
          emptyState.classList.remove('hidden');
        }
      }

      function createPostElement(post) {
        const postEl = document.createElement('div');
        postEl.className = 'post';
        postEl.dataset.postId = post.id;

        const initials = post.author_name.slice(0, 2).toUpperCase();
        const date = new Date(post.created_at);
        const timeAgo = getTimeAgo(date);

        postEl.innerHTML = `
          <div class="post-header">
            <div class="post-avatar">${initials}</div>
            <div class="post-info">
              <div class="post-author">${post.author_name}</div>
              <div class="post-time">${timeAgo}</div>
            </div>
            <button class="post-options">
              <i class="fas fa-ellipsis-h"></i>
            </button>
          </div>

          ${post.image_url ? `
            <div class="post-image-wrapper">
              <img src="${post.image_url}" class="post-image" alt="Post image">
            </div>
          ` : ''}

          <div class="post-actions">
            <button class="action-btn btn-like" data-post-id="${post.id}">
              <i class="far fa-heart"></i>
            </button>
            <button class="action-btn btn-comment" data-post-id="${post.id}">
              <i class="far fa-comment"></i>
            </button>
            <button class="action-btn share">
              <i class="far fa-paper-plane"></i>
            </button>
          </div>

          ${post.likes > 0 ? `<div class="likes-count">${post.likes} ${post.likes === 1 ? 'like' : 'likes'}</div>` : ''}

          <div class="post-content">
            ${post.title ? `<div class="post-title">${post.title}</div>` : ''}
            <div class="post-text">${post.content}</div>
          </div>
        `;

        // Add event listeners
        postEl.querySelector('.btn-like').addEventListener('click', () => toggleLike(post.id));
        postEl.querySelector('.btn-comment').addEventListener('click', () => openPostDetail(post.id));
        postEl.querySelector('.share').addEventListener('click', () => sharePost(post.id));

        return postEl;
      }

      function getTimeAgo(date) {
        const seconds = Math.floor((new Date() - date) / 1000);
        const intervals = {
          year: 31536000,
          month: 2592000,
          week: 604800,
          day: 86400,
          hour: 3600,
          minute: 60
        };

        for (const [unit, secondsInUnit] of Object.entries(intervals)) {
          const interval = Math.floor(seconds / secondsInUnit);
          if (interval >= 1) {
            return `${interval} ${unit}${interval !== 1 ? 's' : ''} ago`;
          }
        }
        return 'just now';
      }

      async function toggleLike(postId) {
        try {
          const btn = document.querySelector(`[data-post-id="${postId}"].btn-like`);
          const icon = btn.querySelector('i');
          const isLiked = icon.classList.contains('fas');

          if (isLiked) {
            await supabase
              .from('community_post_likes')
              .delete()
              .eq('post_id', postId)
              .eq('user_id', currentUser.user_id);

            await supabase.rpc('decrement_post_likes', { post_id_param: postId });
            icon.classList.remove('fas');
            icon.classList.add('far');
            btn.classList.remove('liked');
          } else {
            await supabase
              .from('community_post_likes')
              .insert({ post_id: postId, user_id: currentUser.user_id });

            await supabase.rpc('increment_post_likes', { post_id_param: postId });
            icon.classList.remove('far');
            icon.classList.add('fas');
            btn.classList.add('liked');
          }

          loadPosts(); // Refresh to show updated like count
        } catch (err) {
          console.error('Error toggling like:', err);
        }
      }

      async function openPostDetail(postId) {
        try {
          const { data: post, error } = await supabase
            .from('community_posts')
            .select('*')
            .eq('id', postId)
            .single();

          if (error) throw error;

          currentPost = post;

          const { data: comments } = await supabase
            .from('community_comments')
            .select('*')
            .eq('post_id', postId)
            .is('parent_id', null)
            .order('created_at', { ascending: true });

          const initials = post.author_name.slice(0, 2).toUpperCase();
          const date = new Date(post.created_at);
          const timeAgo = getTimeAgo(date);

          document.getElementById('postDetailContent').innerHTML = `
            <div class="post-header">
              <div class="post-avatar">${initials}</div>
              <div class="post-info">
                <div class="post-author">${post.author_name}</div>
                <div class="post-time">${timeAgo}</div>
              </div>
            </div>

            ${post.image_url ? `
              <div class="post-image-wrapper">
                <img src="${post.image_url}" class="post-image" alt="Post image">
              </div>
            ` : ''}

            <div class="post-content">
              ${post.title ? `<div class="post-title">${post.title}</div>` : ''}
              <div class="post-text">${post.content}</div>
            </div>

            <div class="comments-section">
              <div class="comments-header">
                <i class="fas fa-comments"></i> Comments (${comments?.length || 0})
              </div>
              <div class="comment-form">
                <input type="text" class="comment-input" id="newCommentInput" placeholder="Write a comment...">
                <button class="btn-comment" id="submitCommentBtn">Post</button>
              </div>
              <div class="comments-list" id="commentsList">
                ${comments?.map(c => createCommentHTML(c)).join('') || '<p style="color:var(--text-muted);font-size:14px;padding:20px 0;">No comments yet.</p>'}
              </div>
            </div>
          `;

          postDetailModal.classList.add('active');

          document.getElementById('submitCommentBtn').addEventListener('click', submitComment);
          document.getElementById('newCommentInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') submitComment();
          });

        } catch (err) {
          console.error('Error opening post detail:', err);
        }
      }

      function createCommentHTML(comment) {
        const initials = comment.author_name.slice(0, 2).toUpperCase();
        const time = new Date(comment.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        
        return `
          <div class="comment">
            <div class="comment-avatar">${initials}</div>
            <div class="comment-content">
              <div class="comment-author">${comment.author_name} · ${time}</div>
              <div class="comment-text">${comment.content}</div>
            </div>
          </div>
        `;
      }

      async function submitComment() {
        const input = document.getElementById('newCommentInput');
        const content = input.value.trim();
        
        if (!content) return;

        try {
          await supabase
            .from('community_comments')
            .insert({
              post_id: currentPost.id,
              author_id: currentUser.user_id,
              author_name: isAdmin ? 'Admin' : 'Member',
              content: content
            });

          input.value = '';
          openPostDetail(currentPost.id); // Refresh
        } catch (err) {
          console.error('Error submitting comment:', err);
        }
      }

      function sharePost(postId) {
        const url = `${window.location.origin}${window.location.pathname}?post=${postId}`;
        navigator.clipboard.writeText(url).then(() => {
          alert('Post link copied to clipboard!');
        });
      }

      function closePostDetailModal() {
        postDetailModal.classList.remove('active');
      }

      // Create Post
      function openCreatePostModal() {
        createPostModal.classList.add('active');
      }

      function closeCreatePostModal() {
        createPostModal.classList.remove('active');
        document.getElementById('createPostForm').reset();
        document.getElementById('imagePreview').style.display = 'none';
      }

      function handleImageSelect(e) {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (e) => {
            document.getElementById('previewImg').src = e.target.result;
            document.getElementById('imagePreview').style.display = 'block';
          };
          reader.readAsDataURL(file);
        }
      }

      async function handleCreatePost(e) {
        e.preventDefault();

        if (!isAdmin) return;

        const title = document.getElementById('postTitle').value;
        const content = document.getElementById('postContent').value;
        const imageFile = document.getElementById('postImage').files[0];

        let imageUrl = null;
        if (imageFile) {
          const reader = new FileReader();
          imageUrl = await new Promise((resolve) => {
            reader.onload = (e) => resolve(e.target.result);
            reader.readAsDataURL(imageFile);
          });
        }

        try {
          await supabase
            .from('community_posts')
            .insert({
              guild_id: CONFIG.GUILD_ID,
              author_id: currentUser.user_id,
              author_name: 'Admin',
              title: title,
              content: content,
              image_url: imageUrl
            });

          closeCreatePostModal();
          switchView('feed');
          loadPosts();
        } catch (err) {
          console.error('Error creating post:', err);
          alert('Failed to create post');
        }
      }

      // Messages
      async function loadMessages(channelType) {
        const container = document.getElementById('chatMessages');
        container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted);">Loading messages...</div>';

        try {
          const { data, error } = await supabase
            .from('community_chat_messages')
            .select('*')
            .eq('guild_id', CONFIG.GUILD_ID)
            .eq('channel_type', channelType)
            .order('created_at', { ascending: false })
            .limit(100);

          if (error) throw error;

          container.innerHTML = '';

          if (!data || data.length === 0) {
            container.innerHTML = '<div style="text-align:center;padding:60px;color:var(--text-muted);">No messages yet. Start the conversation!</div>';
            return;
          }

          data.reverse().forEach(msg => {
            container.appendChild(createMessageElement(msg));
          });

          container.scrollTop = container.scrollHeight;
        } catch (err) {
          console.error('Error loading messages:', err);
        }
      }

      function createMessageElement(msg) {
        const msgEl = document.createElement('div');
        msgEl.className = 'message';

        const initials = msg.author_name.slice(0, 2).toUpperCase();
        const time = new Date(msg.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

        msgEl.innerHTML = `
          <div class="message-avatar">${initials}</div>
          <div class="message-content">
            <div class="message-header">
              <span class="message-author">${msg.author_name}</span>
              <span class="message-time">${time}</span>
            </div>
            <div class="message-text">${msg.content}</div>
          </div>
        `;

        return msgEl;
      }

      async function sendMessage() {
        const input = document.getElementById('messageInput');
        const content = input.value.trim();

        if (!content) return;

        // Check permissions
        if (currentChannel === 'admin' && !isAdmin) return;

        try {
          await supabase
            .from('community_chat_messages')
            .insert({
              guild_id: CONFIG.GUILD_ID,
              channel_type: currentChannel,
              author_id: currentUser.user_id,
              author_name: isAdmin ? 'Admin' : 'Member',
              content: content
            });

          input.value = '';
        } catch (err) {
          console.error('Error sending message:', err);
        }
      }

      // Realtime subscriptions
      function subscribeToRealtime() {
        // Posts
        supabase
          .channel('posts_channel')
          .on('postgres_changes', {
            event: 'INSERT',
            schema: 'public',
            table: 'community_posts',
            filter: `guild_id=eq.${CONFIG.GUILD_ID}`
          }, () => loadPosts())
          .subscribe();

        // Messages
        supabase
          .channel('messages_channel')
          .on('postgres_changes', {
            event: 'INSERT',
            schema: 'public',
            table: 'community_chat_messages',
            filter: `guild_id=eq.${CONFIG.GUILD_ID}`
          }, (payload) => {
            const msg = payload.new;
            if (msg.channel_type === currentChannel) {
              const container = document.getElementById('chatMessages');
              container.appendChild(createMessageElement(msg));
              container.scrollTop = container.scrollHeight;
            }
          })
          .subscribe();

        // Comments
        supabase
          .channel('comments_channel')
          .on('postgres_changes', {
            event: 'INSERT',
            schema: 'public',
            table: 'community_comments'
          }, () => {
            if (currentPost && postDetailModal.classList.contains('active')) {
              openPostDetail(currentPost.id);
            }
          })
          .subscribe();
      }
    })();
  </script>
</body>
